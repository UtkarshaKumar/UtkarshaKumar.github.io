name: Writing Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests markdown

      - name: Sync Notion + Medium into writing/, writing.html, and index.html
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python3 scripts/sync_writing.py

      - name: Commit and push
        run: |
          git config --global user.name "Utkarsh Kumar"
          git config --global user.email "utkarshsinghinbox@gmail.com"
          git add index.html writing.html writing/
          git commit -m "Automated Sync: Update writing from Notion and Medium" || exit 0
          git push origin main
