name: Writing Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Notion + Medium into writing.html and index.html
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python3 << 'PYEOF'
          import os, re, html as html_lib, requests
          import xml.etree.ElementTree as ET
          from email.utils import parsedate_to_datetime

          token = os.environ['NOTION_TOKEN']
          db_id  = os.environ['NOTION_DATABASE_ID']

          headers = {
              'Authorization': f'Bearer {token}',
              'Notion-Version': '2022-06-28',
              'Content-Type': 'application/json',
          }

          MEDIUM_FEED = 'https://medium.com/feed/@utkarshsingh_96177'

          # ── helpers ──────────────────────────────────────────────────────────

          def get_excerpt(page_id, max_chars=140):
              """Fetch first meaningful text block from a Notion page."""
              resp = requests.get(
                  f'https://api.notion.com/v1/blocks/{page_id}/children',
                  headers=headers,
                  params={'page_size': 15},
              )
              blocks = resp.json().get('results', [])

              TEXT_TYPES = {
                  'paragraph', 'heading_1', 'heading_2', 'heading_3',
                  'bulleted_list_item', 'numbered_list_item', 'quote', 'callout',
              }
              for block in blocks:
                  btype = block.get('type', '')
                  if btype in TEXT_TYPES:
                      rich = block.get(btype, {}).get('rich_text', [])
                      text = ''.join(r.get('plain_text', '') for r in rich).strip()
                      if text:
                          return text
              return ''

          def fetch_notion_items():
              resp = requests.post(
                  f'https://api.notion.com/v1/databases/{db_id}/query',
                  headers=headers,
                  json={
                      'filter': {
                          'property': 'RequestPublishing',
                          'checkbox': {'equals': True},
                      },
                      'sorts': [{'property': 'PublishedAt', 'direction': 'descending'}],
                  },
              )
              data = resp.json()
              if 'results' not in data:
                  print('WARNING: Notion API returned:', data)
                  return []

              items = []
              for page in data['results']:
                  props = page['properties']

                  title_prop = props.get('Title', props.get('Name', {}))
                  title_arr  = title_prop.get('title', [])
                  title      = title_arr[0]['plain_text'] if title_arr else 'Untitled'

                  date_obj  = props.get('PublishedAt', {}).get('date') or {}
                  date_str  = date_obj.get('start', '')

                  items.append({
                      'title': title,
                      'url': page.get('url', '#'),
                      'sort_key': date_str[:10] if date_str else '0000-00-00',
                      'date_disp': date_str[:7] if date_str else '',
                      'source': 'Notion',
                  })
              return items

          def fetch_medium_items(limit=20):
              """Public RSS feed, no auth. Degrades gracefully on failure."""
              try:
                  resp = requests.get(MEDIUM_FEED, timeout=15)
                  resp.raise_for_status()
                  root = ET.fromstring(resp.content)
              except Exception as e:
                  print('WARNING: Medium fetch failed:', e)
                  return []

              items = []
              for item in root.findall('./channel/item')[:limit]:
                  title = (item.findtext('title') or '').strip()
                  link  = (item.findtext('link') or '').strip()
                  pub   = item.findtext('pubDate') or ''
                  try:
                      dt = parsedate_to_datetime(pub)
                      sort_key  = dt.strftime('%Y-%m-%d')
                      date_disp = dt.strftime('%Y-%m')
                  except Exception:
                      sort_key, date_disp = '0000-00-00', ''

                  items.append({
                      'title': title,
                      'url': link,
                      'sort_key': sort_key,
                      'date_disp': date_disp,
                      'source': 'Medium',
                  })
              return items

          def render_row(it):
              safe_title  = html_lib.escape(it['title'])
              safe_date   = html_lib.escape(it['date_disp'] or '—')
              safe_source = html_lib.escape(it['source'])
              return (
                  f'<a class="wrow" href="{it["url"]}" target="_blank" rel="noopener">'
                  f'<span class="wdate">{safe_date}</span>'
                  f'<span class="wtitle">{safe_title}</span>'
                  f'<span class="wsource">{safe_source}</span>'
                  f'</a>'
              )

          def inject(path, start_marker, end_marker, block):
              with open(path, 'r') as f:
                  content = f.read()
              pattern = re.escape(start_marker) + r'.*?' + re.escape(end_marker)
              new_content = re.sub(
                  pattern,
                  f'{start_marker}\n{block}\n{end_marker}',
                  content,
                  flags=re.DOTALL,
              )
              with open(path, 'w') as f:
                  f.write(new_content)

          # ── fetch + merge ────────────────────────────────────────────────────

          notion_items = fetch_notion_items()
          medium_items = fetch_medium_items()
          merged = sorted(notion_items + medium_items, key=lambda x: x['sort_key'], reverse=True)

          if merged:
              full_block   = '\n'.join(render_row(it) for it in merged)
              latest_block = render_row(merged[0])
          else:
              full_block = latest_block = '<div class="wlist-empty">Nothing published yet.</div>'

          inject('writing.html', '<!-- WRITING_LIST_START -->', '<!-- WRITING_LIST_END -->', full_block)
          inject('index.html', '<!-- LATEST_WRITING_START -->', '<!-- LATEST_WRITING_END -->', latest_block)

          print(f'Synced {len(merged)} item(s): {len(notion_items)} Notion, {len(medium_items)} Medium')
          PYEOF

      - name: Commit and push
        run: |
          git config --global user.name "Utkarsh Kumar"
          git config --global user.email "utkarshsinghinbox@gmail.com"
          git add index.html writing.html
          git commit -m "Automated Sync: Update writing from Notion and Medium" || exit 0
          git push origin main
